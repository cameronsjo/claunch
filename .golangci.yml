# golangci-lint v2 configuration. See https://golangci-lint.run/
version: "2"

linters:
  # default set (errcheck, govet, ineffassign, staticcheck, unused) plus:
  enable:
    - misspell
  settings:
    errcheck:
      # Writes to stdout/stderr are fire-and-forget for a CLI — a failed write
      # to an already-flushed terminal stream is not actionable.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

formatters:
  enable:
    - gofmt
    - goimports
