# claunch configuration — TOML
#
# Location: ~/.config/claunch/claunch.conf  (or $XDG_CONFIG_HOME/claunch/claunch.conf)
# Scaffold one with:  claunch init
# Inspect the resolved profile for the current directory with:  claunch which
#
# Resolution: claunch expands ~, then picks the [[project]] whose `match` is the
# longest path-prefix of the real working directory, and merges it over [defaults].
#   - scalars (model, permission_mode, allow_danger): project wins when set
#   - env: merged, project wins on key collisions
#   - add_dir: concatenated and de-duplicated
# No match falls back to [defaults] alone.

[defaults]
model           = "opus"     # claude --model value (alias or full id)
permission_mode = "plan"     # claunch always starts in plan
allow_danger    = true       # adds --allow-dangerously-skip-permissions (reachable, not on)

# Per-project overrides. Add as many [[project]] blocks as you like.

[[project]]
match           = "~/Projects/minute"
model           = "sonnet"
env             = { OTEL_EXPORTER = "otlp" }
add_dir         = ["~/Projects/minute/shared"]

[[project]]
match           = "~/Projects/infrastructure"
add_dir         = ["~/Projects/infrastructure/homelab"]
